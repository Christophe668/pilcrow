name: Package KOReader plugin
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Self-update expects a `pilcrow*.zip` asset containing
      # `pilcrow.koplugin/` at any depth. Zip from `koreader-plugin/`
      # so the directory sits at the archive root.
      - name: Build pilcrow.koplugin.zip
        id: zip
        run: |
          name="pilcrow.koplugin-${GITHUB_REF_NAME//\//-}.zip"
          (cd koreader-plugin && zip -r "../$name" pilcrow.koplugin)
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "path=$name" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.name }}
          path: ${{ steps.zip.outputs.path }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.path }}
