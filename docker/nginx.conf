# Pilcrow — nginx site config for the static expo-router export.
#
# Key behaviour:
# - Hashed asset bundle under /_expo/ gets a 1-year immutable cache.
# - Pre-rendered route HTML (e.g. /stats.html) is served when present.
# - Anything unmatched falls back to /index.html so the client-side
#   router can take over (e.g. dynamic routes like /article/[id]).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reasonable defaults.
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # Compression — most output is JS/HTML/CSS/JSON.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;

    # Hashed asset bundle is content-addressed; cache hard.
    location /_expo/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Fonts — cache hard regardless of folder (.ttf/.otf/.woff2).
    location ~* \.(?:ttf|otf|woff2?)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Everything else: prefer pre-rendered HTML (foo → foo.html),
    # then directory index, then SPA fallback.
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
        add_header Cache-Control "no-cache";
    }

    # Health probe for orchestrators.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
